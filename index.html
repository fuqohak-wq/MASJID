<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat Support</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 450px; height: 85vh; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; }
        .chat-header { background: #0088cc; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 10px 14px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .message.user { background: #d9fdd3; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message.bot-admin { background: #f0f0f0; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input-area { padding: 12px; background: #f0f2f5; display: flex; gap: 8px; border-top: 1px solid #e0e0e0; }
        .chat-input-area input { flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 0.95rem; }
        .chat-input-area button { background: #0088cc; color: white; border: none; padding: 0 18px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .chat-input-area button:hover { background: #006699; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🌐 Customer Support (AI + Human Hybrid)</div>
    <div class="chat-messages" id="chatBox">
        <div class="message bot-admin">Halo! Ada yang bisa kami bantu hari ini? 😊</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Ketik pesan di sini..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    // GANTI DENGAN URL DEPLOYMENT GOOGLE APPS SCRIPT ANDA
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwhmFQ5uEqYh3r_NSPTW662LiSlySB8CQM7LLd_klWijkxpy3OuTE-TpEkr0VjaHS30ng/exec";

    // Membuat Sesi ID unik acak untuk user saat membuka webapp
    let chatId = localStorage.getItem("chat_session_id");
    if (!chatId) {
        chatId = "USER_" + Math.random().toString(36).substring(2, 9).toUpperCase();
        localStorage.setItem("chat_session_id", chatId);
    }

    let localMessagesCount = 0;

    // Fungsi Mengirim Pesan
    function sendMessage() {
        const inputEl = document.getElementById("userInput");
        const msgText = inputEl.value.trim();
        if (!msgText) return;

        // Render langsung pesan user ke layar
        appendMessage(msgText, "user");
        inputEl.value = "";

        // Kirim data ke backend GAS via POST API
        fetch(GAS_WEBAPP_URL, {
            method: "POST",
            mode: "no-cors", // Bypass CORS demi kemudahan GAS Webapp
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                action: "user_chat",
                chatId: chatId,
                message: msgText
            })
        });
        
        // Langsung trigger load chat setelah mengirim data baru
        setTimeout(loadChatUpdates, 1500);
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }

    function appendMessage(text, sender) {
        const chatBox = document.getElementById("chatBox");
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("message", sender === "user" ? "user" : "bot-admin");
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Polling Fungsi untuk Menarik Update Balasan dari Google Sheets secara real-time
    async function loadChatUpdates() {
        try {
            let res = await fetch(`${GAS_WEBAPP_URL}?chatId=${chatId}`);
            let data = await res.json();
            
            // Jika ada pesan baru dari AI / Admin di Database Sheets, render ke layar
            if (data.updates && data.updates.length > localMessagesCount) {
                const chatBox = document.getElementById("chatBox");
                // Reset chatbox ke template dasar lalu render ulang seluruh update ter-sinkron
                chatBox.innerHTML = '<div class="message bot-admin">Halo! Ada yang bisa kami bantu hari ini? 😊</div>';
                
                data.updates.forEach(msg => {
                    appendMessage(msg.message, msg.sender.toLowerCase() === 'user' ? 'user' : 'bot-admin');
                });
                localMessagesCount = data.updates.length;
            }
        } catch (e) {
            console.log("Sinkronisasi gagal, mencoba lagi nanti...");
        }
    }

    // Jalankan Sinkronisasi Otomatis setiap 4 Detik (Real-time update dari Telegram)
    setInterval(loadChatUpdates, 4000);
    window.onload = loadChatUpdates;
</script>

</body>
</html>
